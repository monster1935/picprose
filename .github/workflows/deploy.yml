name: Deploy Picprose to Tencent Cloud (PM2)

# 仅手动触发
on:
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  # 服务器上部署目录
  REMOTE_DIR: /www/picprose
  # PM2 进程名
  PM2_APP_NAME: picprose

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建 Next.js
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # 5. 打包构建产物（仅运行所需文件）
      - name: Package artifacts
        run: |
          tar -czf deploy.tar.gz \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.mjs \
            i18n.ts \
            middleware.ts \
            locales \
            tsconfig.json

      # 6. 通过 SCP 上传到服务器
      - name: Upload to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy.tar.gz"
          target: ${{ env.REMOTE_DIR }}

      # 7. SSH 远程部署：解包、安装生产依赖、PM2 重启
      - name: Deploy & restart with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ${{ env.REMOTE_DIR }}

            # 备份上一次构建（可选）
            rm -rf .next.bak
            [ -d ".next" ] && mv .next .next.bak || true

            # 解压新构建
            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz

            # 安装生产依赖
            npm ci --omit=dev

            # 启动 / 重启 PM2 进程
            if pm2 describe ${{ env.PM2_APP_NAME }} > /dev/null 2>&1; then
              pm2 reload ${{ env.PM2_APP_NAME }} --update-env
            else
              PORT=3000 pm2 start npm --name ${{ env.PM2_APP_NAME }} -- run start
            fi

            pm2 save
